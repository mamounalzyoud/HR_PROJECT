{% extends 'base.html' %}

{% block title %}New Announcement{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Create New Announcement</h1>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" action="{{ url_for('announcements.new_announcement') }}">
            <div class="mb-3">
                <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="title" name="title" required value="{{ request.form['title'] if request.form else '' }}">
            </div>
            <div class="mb-3">
                <label for="content" class="form-label">Content <span class="text-danger">*</span></label>
                <textarea class="form-control" id="content" name="content" rows="8" required>{{ request.form['content'] if request.form else '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Post Announcement</button>
            <a href="{{ url_for('announcements.view_announcements') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
