{% extends 'base.html' %}

{% block title %}Submit Expense Claim{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Submit New Expense Claim</h1>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" action="{{ url_for('expenses.submit_expense') }}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="expense_date" class="form-label">Date Incurred <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="expense_date" name="expense_date" required value="{{ request.form['expense_date'] if request.form else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="" disabled selected>Select category...</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if request.form and request.form['category'] == cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="amount" class="form-label">Amount <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" min="0.01" class="form-control" id="amount" name="amount" required value="{{ request.form['amount'] if request.form else '' }}">
                </div>
                 <div class="col-md-6 mb-3">
                    <label for="currency" class="form-label">Currency <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="currency" name="currency" value="{{ request.form['currency'] if request.form else 'USD' }}" required>
                </div>
            </div>
             <div class="mb-3">
                <label for="description" class="form-label">Description <span class="text-danger">*</span></label>
                <textarea class="form-control" id="description" name="description" rows="3" required>{{ request.form['description'] if request.form else '' }}</textarea>
            </div>
            {# Add file upload field later if needed #}
            {# <div class="mb-3">
                <label for="receipt" class="form-label">Receipt (Optional)</label>
                <input class="form-control" type="file" id="receipt" name="receipt">
            </div> #}

            <button type="submit" class="btn btn-primary">Submit Claim</button>
            <a href="{{ url_for('expenses.view_my_expenses') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
