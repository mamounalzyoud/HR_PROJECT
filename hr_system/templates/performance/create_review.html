{% extends 'base.html' %}

{% block title %}New Performance Review{% endblock %}

{% block content %}
<h1 class="h3 mb-3">New Performance Review for: {{ employee['full_name'] }}</h1>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" action="{{ url_for('performance.create_review', employee_id=employee['id']) }}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="review_period_start" class="form-label">Review Period Start <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="review_period_start" name="review_period_start" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="review_period_end" class="form-label">Review Period End <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="review_period_end" name="review_period_end" required>
                </div>
            </div>
            <div class="mb-3">
                 <label for="overall_rating" class="form-label">Overall Rating (Optional, 1-5)</label>
                 <select class="form-select" id="overall_rating" name="overall_rating">
                     <option value="">-- Select Rating --</option>
                     <option value="1">1 - Needs Improvement</option>
                     <option value="2">2 - Below Expectations</option>
                     <option value="3">3 - Meets Expectations</option>
                     <option value="4">4 - Exceeds Expectations</option>
                     <option value="5">5 - Outstanding</option>
                 </select>
            </div>
            <div class="mb-3">
                <label for="manager_comments" class="form-label">Manager Comments</label>
                <textarea class="form-control" id="manager_comments" name="manager_comments" rows="8" placeholder="Enter review comments, goals, areas for development..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Save Review</button>
            <a href="{{ url_for('performance.manage_performance') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
